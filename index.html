<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Mosaic Reveal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap');

        /* Prevent unwanted browser behaviors on mobile */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'JetBrains Mono', monospace;
        }

        canvas {
            display: block;
            touch-action: none;
            cursor: grab;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }
        canvas:active { cursor: grabbing; }

        /* UI Elements */
        #zoom-instruction {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-weight: bold;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: clamp(14px, 4vw, 18px);
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease-in;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
            width: 90%;
            text-align: center;
        }

        #action-button {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease-in, transform 0.2s;
            box-shadow: 0 10px 25px rgba(190, 24, 93, 0.5);
            font-size: 14px;
        }

        /* Initial Loading Screen */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1000;
        }

        #loading-text {
            color: #ec4899;
            font-weight: bold;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(236, 72, 153, 0.1);
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Modal / Poll Styles */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: #111;
            border: 1px solid #333;
            padding: 40px 24px;
            border-radius: 28px;
            width: 88%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .modal-title {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .poll-option {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 16px;
            color: #888;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.2s;
            font-size: 14px;
        }

        .poll-option.selected {
            border-color: #ec4899;
            color: #fff;
            background: rgba(236, 72, 153, 0.1);
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-base {
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        .ok-btn { background: #fff; color: #000; }
        .no-btn { background: #333; color: #fff; transition: none; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div id="loading-text">Initializing...</div>
        <div class="spinner"></div>
    </div>

    <!-- Poll 1 -->
    <div id="poll-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">He is:</h2>
            <div class="poll-option" onclick="selectOption(this)">My Prince Charming</div>
            <div class="poll-option" onclick="selectOption(this)">Jung Hae-in</div>
            <button class="btn-base ok-btn" style="width: 100%; margin-top: 10px;" onclick="submitFirstPoll()">Next</button>
        </div>
    </div>

    <!-- Poll 2 -->
    <div id="yours-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Absolutely Right</h2>
            <h2 class="modal-title">Do you wanna see yours?</h2>
            <div class="btn-row">
                <button class="btn-base ok-btn" onclick="revealYours()">Yes</button>
                <button id="no-button" class="btn-base no-btn" onmouseover="jumpNoButton()" ontouchstart="jumpNoButton()">No</button>
            </div>
        </div>
    </div>

    <div id="zoom-instruction">Zoom Out to See More</div>
    <canvas id="mainCanvas"></canvas>
    <button id="action-button">Do you know him?</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const loadingOverlay = document.getElementById('loading-overlay');
        const zoomInstr = document.getElementById('zoom-instruction');
        const actionBtn = document.getElementById('action-button');
        const pollModal = document.getElementById('poll-modal');
        const yoursModal = document.getElementById('yours-modal');
        const noButton = document.getElementById('no-button');

        // Configuration
        const IMAGE_1 = 'https://raw.githubusercontent.com/nfvortexnfvortex-eng/hr/refs/heads/main/157b94c1-d654-476b-b71d-f431efed7de5.png';
        const IMAGE_2 = 'https://raw.githubusercontent.com/nfvortexnfvortex-eng/hr/refs/heads/main/ChatGPT%20Image%20Mar%2031%2C%202026rge%2C%2004_23_08%20AM.png';
        const TEXT = " HAPPY BIRTHDAY";
        const STEP = 4;

        let img = new Image();
        let imgData = null;
        let isLoaded = false;
        let selectedValue = null;
        
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;

        // Multi-platform Interaction State
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let initialPinchDist = null;
        let initialScale = 1;

        function init() {
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Load First Image
            loadImage(IMAGE_1);

            // Listeners for Zoom/Pan
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            canvas.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', doDrag);
            window.addEventListener('mouseup', endDrag);

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            actionBtn.addEventListener('click', () => openModal(pollModal));
        }

        function loadImage(url) {
            isLoaded = false;
            canvas.style.opacity = '0';
            loadingOverlay.style.display = 'flex';
            loadingOverlay.style.opacity = '1';

            img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                processImg(true); // pass true to indicate initial load zoom
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 800);
                canvas.style.opacity = '1';
                zoomInstr.style.opacity = '1';
                if (url === IMAGE_1) actionBtn.style.opacity = '1';
            };
            img.src = url;
        }

        // --- GESTURE & INTERACTION LOGIC ---
        function getDist(touches) { return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY); }

        function handleTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDist = getDist(e.touches);
                initialScale = scale;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                offsetX += e.touches[0].pageX - lastX;
                offsetY += e.touches[0].pageY - lastY;
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            } else if (e.touches.length === 2 && initialPinchDist) {
                const currentDist = getDist(e.touches);
                const factor = currentDist / initialPinchDist;
                const nextScale = initialScale * factor;
                if (nextScale > 0.005 && nextScale < 5000) {
                    const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    offsetX = midX - (midX - offsetX) * (nextScale / scale);
                    offsetY = midY - (midY - offsetY) * (nextScale / scale);
                    scale = nextScale;
                }
            }
        }

        function handleTouchEnd() { isDragging = false; initialPinchDist = null; }

        function handleWheel(e) {
            e.preventDefault();
            const factor = Math.pow(1.1, -e.deltaY / 100);
            const nextScale = scale * factor;
            if (nextScale > 0.01 && nextScale < 5000) {
                offsetX = e.clientX - (e.clientX - offsetX) * (nextScale / scale);
                offsetY = e.clientY - (e.clientY - offsetY) * (nextScale / scale);
                scale = nextScale;
            }
        }

        function startDrag(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; }
        function doDrag(e) { if (isDragging) { offsetX += e.clientX - lastX; offsetY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; } }
        function endDrag() { isDragging = false; }

        // --- POLL & REVEAL LOGIC ---
        function jumpNoButton() {
            const maxX = window.innerWidth - 120;
            const maxY = window.innerHeight - 100;
            noButton.style.position = 'fixed';
            noButton.style.left = Math.random() * maxX + 'px';
            noButton.style.top = Math.random() * maxY + 'px';
        }

        function openModal(m) { m.style.display = 'flex'; setTimeout(() => m.style.opacity = '1', 10); }
        function closeModal(m) { m.style.opacity = '0'; setTimeout(() => m.style.display = 'none', 300); }
        function selectOption(el) { document.querySelectorAll('.poll-option').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); selectedValue = el.innerText; }
        function submitFirstPoll() { if (!selectedValue) return; closeModal(pollModal); setTimeout(() => openModal(yoursModal), 500); }
        function revealYours() { closeModal(yoursModal); actionBtn.style.display = 'none'; zoomInstr.innerText = "Zoom Out"; loadImage(IMAGE_2); }

        function processImg(isInitialLoad = false) {
            const temp = document.createElement('canvas');
            const max = window.innerWidth < 600 ? 1200 : 1800; // Perf tuning for mobile
            let w = img.width, h = img.height;
            if (w > max || h > max) { const r = max / Math.max(w, h); w *= r; h *= r; }
            temp.width = w; temp.height = h;
            const tCtx = temp.getContext('2d');
            tCtx.drawImage(img, 0, 0, w, h);
            imgData = tCtx.getImageData(0, 0, w, h);
            isLoaded = true;

            // Start Zoomed In logic
            const fitScale = Math.min(canvas.width / w, canvas.height / h) * 0.85;
            
            if (isInitialLoad) {
                scale = fitScale * 15; // Start 15x zoomed in
            } else {
                scale = fitScale;
            }

            // Centering logic for the zoomed in view
            offsetX = (canvas.width / 2) - (w / 2 * scale);
            offsetY = (canvas.height / 2) - (h / 2 * scale);
            
            if (!window.animating) { window.animating = true; animate(); }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (isLoaded) {
                // Adjust position on resize without snapping scale back unless very zoomed out
                const w = imgData.width, h = imgData.height;
                if (scale < Math.min(canvas.width / w, canvas.height / h)) {
                    scale = Math.min(canvas.width / w, canvas.height / h) * 0.8;
                    offsetX = (canvas.width - w * scale) / 2;
                    offsetY = (canvas.height - h * scale) / 2;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!isLoaded) return;

            const fontSize = STEP * scale;
            ctx.font = `900 ${Math.ceil(fontSize)}px "JetBrains Mono", monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const dw = imgData.width, dh = imgData.height, data = imgData.data;

            // Viewport culling for performance
            const sX = Math.max(0, Math.floor(-offsetX / (scale * STEP)) * STEP);
            const sY = Math.max(0, Math.floor(-offsetY / (scale * STEP)) * STEP);
            const eX = Math.min(dw, Math.ceil((canvas.width - offsetX) / (scale * STEP)) * STEP + STEP);
            const eY = Math.min(dh, Math.ceil((canvas.height - offsetY) / (scale * STEP)) * STEP + STEP);

            for (let y = sY; y < eY; y += STEP) {
                for (let x = sX; x < eX; x += STEP) {
                    const i = (y * dw + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    if (r + g + b < 15) continue; 
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    const cIdx = (Math.floor(x/STEP) + Math.floor(y/STEP)) % TEXT.length;
                    ctx.fillText(TEXT[cIdx], x * scale + offsetX + (fontSize/2), y * scale + offsetY + (fontSize/2));
                }
            }
        }

        function animate() { draw(); requestAnimationFrame(animate); }
        init();
    </script>
</body>
</html>
